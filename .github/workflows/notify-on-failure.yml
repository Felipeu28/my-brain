name: Notify on Deploy Failure

# Sidecar to .github/workflows/deploy.yml. Runs after every completed
# Deploy Quartz run on main. On failure: opens a GitHub issue tagged
# ci-broken, assigned to @Felipeu28, with run URL + last commit info.
# On success: auto-closes any open ci-broken issue with a "green again"
# comment. Issue creation triggers GitHub's default email subscription,
# routing CI failures through Andres's existing inbox without any UI
# preference change.
#
# Pattern: sidecar (workflow_run) rather than `if: failure()` step
# inside deploy.yml so the build workflow stays focused on its job.
#
# Implementation plan item 7 / closing-plan-2026-05-03 item 7.

on:
  workflow_run:
    workflows: ["Deploy Quartz site to GitHub Pages"]
    types:
      - completed

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure ci-broken label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ci-broken \
            --description "Auto-opened by notify-on-failure when a deploy fails; auto-closed on next green run" \
            --color B60205 \
            --force \
            --repo "${{ github.repository }}" || true

      - name: Open issue on failure
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const shortSha = run.head_sha.slice(0, 7);
            const msg = ((run.head_commit && run.head_commit.message) || '(no commit message)').split('\n')[0];
            const titleMsg = msg.length > 70 ? msg.slice(0, 67) + '…' : msg;
            const title = `🔴 CI failed: ${titleMsg} (${shortSha})`;
            const body = [
              `**Workflow:** ${run.name}`,
              `**Run:** ${run.html_url}`,
              `**Commit:** \`${shortSha}\` — ${msg}`,
              `**Branch:** ${run.head_branch}`,
              `**Triggered at:** ${run.created_at}`,
              ``,
              `Auto-opened by \`.github/workflows/notify-on-failure.yml\` because the deploy workflow failed.`,
              `Auto-closed when the next run on \`${run.head_branch}\` succeeds — no need to close manually.`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-broken',
              state: 'open',
              per_page: 5,
            });

            if (existing.data.length > 0) {
              const num = existing.data[0].number;
              core.info(`Existing open ci-broken issue #${num} — adding failure comment instead of new issue`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: `Another failure on the same gate: ${run.html_url}\n\nCommit \`${shortSha}\` — ${msg}`,
              });
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-broken'],
              assignees: ['Felipeu28'],
            });
            core.info(`Opened issue #${created.data.number}: ${title}`);

      - name: Close ci-broken issues on success
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const shortSha = run.head_sha.slice(0, 7);
            const msg = ((run.head_commit && run.head_commit.message) || '').split('\n')[0];

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-broken',
              state: 'open',
              per_page: 10,
            });

            if (issues.data.length === 0) {
              core.info('No open ci-broken issues — nothing to close.');
              return;
            }

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Auto-closing — CI green again on \`${shortSha}\` (${msg}).\n\nRun: ${run.html_url}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed issue #${issue.number}`);
            }
